services:
  money-engine:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./.env:/app/.env
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
